<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción AEMET Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .text-warning { color: #ff8c00 !important; } /* Naranja más visible */
        .table th { background-color: #f8f9fa; }
    </style>
</head>
<body class="container mt-5">
<h2 class="mb-4">Predicción Meteorológica</h2>
<table class="table table-bordered text-center align-middle">
    <thead>
    <tr>
        <th th:each="dia : ${semana}"
            th:text="${#temporals.format(dia.fecha, 'dd/MM')}">Fecha</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td th:each="dia : ${semana}">
            <img th:src="${dia.imagenUrl}" width="50"><br>
            <small th:text="${dia.probPrecipitacion} + '%'"></small>
        </td>
    </tr>
    <tr>
        <td th:each="dia : ${semana}">
            <span class="text-primary" th:text="${dia.tempMin} + '°'"></span> /
            <span class="text-danger" th:text="${dia.tempMax} + '°'"></span>
        </td>
    </tr>
    <tr>
        <td th:each="dia : ${semana}">
            <strong>UV:</strong>
            <span th:text="${dia.nivelUV}" th:class="${dia.uvClass}"></span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
